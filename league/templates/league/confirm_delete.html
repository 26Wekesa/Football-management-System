{% extends 'league/base.html' %}
{% block title %}Delete League{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 text-center">
    <div class="card shadow-sm border-danger">
      <div class="card-body p-5">
        <div class="display-3 mb-3">⚠️</div>
        <h4>Delete "{{ league.name }}"?</h4>
        <p class="text-muted">This will permanently delete the league, all teams, and all fixtures.</p>
        <form method="POST" class="d-inline">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger me-2">Yes, Delete</button>
        </form>
        <a href="{% url 'league_detail' league.slug %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
